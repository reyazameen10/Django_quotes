<!-- mini_insta/base.html-->>
 
<html>
<head>
    <title>{% block title %}Mini Insta{% endblock %}</title>
    <meta charset="utf-8">
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            margin: 0; 
            padding: 20px; 
            background: #fafafa; 
        }
        .header { 
            background: linear-gradient(45deg, #405DE6, #5851DB); 
            color: white; 
            padding: 20px; 
            text-align: center; 
            border-radius: 10px; 
            margin-bottom: 30px; 
        }
        .header h1 { margin: 0; font-size: 2em; }
        nav a { 
            color: white; 
            text-decoration: none; 
            margin: 0 15px; 
            font-weight: 500; 
        }
        nav a:hover { text-decoration: underline; }
        main { max-width: 1200px; margin: 0 auto; }
        footer { 
            text-align: center; 
            margin-top: 50px; 
            color: #666; 
            padding: 20px; 
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>🏷️ Mini Insta</h1>
        <nav>
            <a href="{% url 'show_all_profiles' %}">All Profiles</a>
            <a href="/admin/">Admin</a>
        </nav>
    </header>
    
    <main>
        {% block content %}
        {% endblock %}
    </main>
    
    <footer>CS412 Mini Insta &copy; 2026</footer>
</body>
</html>
