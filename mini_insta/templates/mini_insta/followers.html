<!-- mini_insta/ followers.html -->

{% extends 'mini_insta/base.html' %}

{% block content %}
<h2>Followers</h2>

{% if followers %}
    {% for follow in followers %}
        <div style="border:1px solid #ccc; padding:10px; margin:10px;">
            <h3>{{ follow.follower_profile.display_name }}</h3>
            <p>{{ follow.follower_profile.bio_text }}</p>
        </div>
    {% endfor %}
{% else %}
    <p>No followers yet.</p>
{% endif %}

{% endblock %}
