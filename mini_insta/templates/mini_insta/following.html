<!--mini_insta/ following.html-->
{% extends 'mini_insta/base.html' %}

{% block content %}
<h2>Following</h2>

{% if following %}
    {% for follow in following %}
        <div style="border:1px solid #ccc; padding:10px; margin:10px;">
            <h3>{{ follow.profile.display_name }}</h3>
            <p>{{ follow.profile.bio_text }}</p>
        </div>
    {% endfor %}
{% else %}
    <p>Not following anyone yet.</p>
{% endif %}

{% endblock %}
