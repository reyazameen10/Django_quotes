<!-- mini_insta/templates/mini_insta/show_post.html -->
 {% extends 'mini_insta/base.html' %}

{% block content %}

<h1>{{ post.profile.display_name }}</h1>

{% if post.image %}
    <img src="{{ post.image.url }}" width="400">
{% endif %}

{% if post.caption %}
<p>{{ post.caption }}</p>
{% endif %}

<p>Posted on: {{ post.created_at }}</p>

<a href="{% url 'show_profile' post.profile.pk %}">Back to Profile</a>

{% endblock %}
