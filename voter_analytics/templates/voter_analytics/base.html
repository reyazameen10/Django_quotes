<!DOCTYPE html>
<html>
<head>
    <title>Voter Analytics</title>

    <style>
        body {
            font-family: Arial;
            background-color: #d9e2ef;
            margin: 0;
        }

        header {
            background-color: #5f7fa8;
            padding: 15px;
            text-align: center;
        }

        header a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            width: 80%;
            margin: 30px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 8px;
            border-bottom: 1px solid #ddd;
        }

        th {
            text-align: left;
        }

    </style>

</head>

<body>

<header>
    <a href="{% url 'voters' %}">Show Voter List</a>
    <a href="{% url 'graphs' %}">Show Graphs</a>
</header>

<div class="container">

{% block content %}
{% endblock %}

</div>

</body>
</html>
